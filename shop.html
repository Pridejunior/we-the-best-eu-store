<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | WE THE BEST EU STORE</title>
  <link rel="stylesheet" href="stylecart.css">
  <!-- Font Awesome for cart icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


  <style>
    
/* ================= NAVBAR ================= */

.navbar{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #eee;
  z-index:1000;
}

.nav-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:80px;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  letter-spacing:3px;
  font-weight:700;
}

.logo span{
  color:var(--gold);
}

.nav-links{
  display:flex;
  gap:40px;
  list-style:none;
}

.nav-links a{
  text-decoration:none;
  color:var(--black);
  font-size:0.9rem;
  text-transform:uppercase;
  letter-spacing:1px;
  transition:0.3s;
}

.nav-links a:hover{
  color:var(--gold);
}



  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container nav-inner">
    <div class="logo">WE THE BEST <span>EU</span></div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="aboutus.html">About us</a></li>
      <li><a href="contactus.html">Contact</a></li>
      <li><a href="aboutus.html">About us</a></li>
      <li><a href="cart.html">🛒 cart</a></li>
    </ul>
  </div>
</nav>
<!-- Header -->


<!-- Search + Filters + Cart Icon -->
<div class="filters">
  <input type="text" id="searchInput" placeholder="Search products..." />

  <select id="categoryFilter"></select>
  <select id="brandFilter"></select>
  <select id="colorFilter"></select>
  <select id="luxuryFilter">
    <option value="">Luxury?</option>
    <option value="true">Yes</option>
    <option value="false">No</option>
  </select>
  <select id="newFilter">
    <option value="">New?</option>
    <option value="true">Yes</option>
    <option value="false">No</option>
  </select>

  <div class="cart-icon" onclick="toggleMiniCart(true)">
    <i class="fa fa-shopping-cart"></i>
    <span id="cartCount">0</span>
  </div>
</div>

<!-- Products Grid -->
<div id="products" class="products-grid"></div>

<!-- Pagination -->
<div id="pagination" class="pagination"></div>

<!-- Mini Cart -->
<div class="mini-cart" id="miniCart">
  <div class="mini-cart-header">
    <h3>Your Cart</h3>
    <span class="close-btn" onclick="toggleMiniCart(false)">✖</span>
  </div>
  <div id="miniCartItems"></div>
  <h4>Total: $<span id="miniTotal">0</span></h4>
  <button onclick="goToCheckout()">Checkout</button>
</div>

<!-- Scripts -->
<script src="shop.js"></script>

</body>
</html>
