<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | WE THE BEST EU STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#f8f9fa,#eef2f7);
  color:#222;
}

/* HERO */
.contact-hero{
  height:40vh;
  background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
  url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-align:center;
}

.contact-hero h1{
  font-size:48px;
  letter-spacing:2px;
  font-weight:600;
}

/* CONTAINER */
.contact-container{
  max-width:1300px;
  margin:80px auto;
  padding:40px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  background:#fff;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* LEFT INFO */
.contact-info h2{
  font-size:28px;
  margin-bottom:20px;
}

.info-box{
  margin-bottom:25px;
  padding:20px;
  background:rgba(0,0,0,0.03);
  border-radius:15px;
  transition:0.3s;
}

.info-box:hover{
  transform:translateY(-5px);
  background:rgba(0,0,0,0.06);
}

.info-box strong{
  display:block;
  margin-bottom:8px;
  color:#caa550;
}

/* FORM */
.contact-form h2{
  font-size:28px;
  margin-bottom:20px;
}

form{
  display:flex;
  flex-direction:column;
  gap:20px;
}

input, textarea{
  padding:15px;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
  transition:0.3s;
  font-size:14px;
}

input:focus, textarea:focus{
  border-color:#caa550;
  box-shadow:0 0 8px rgba(202,165,80,0.3);
}

textarea{
  resize:none;
  min-height:120px;
}

button{
  padding:15px;
  border:none;
  border-radius:12px;
  background:#caa550;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#a67c1c;
  transform:translateY(-3px);
}

/* MAP */
.map-section{
  margin:80px auto;
  max-width:1300px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

iframe{
  width:100%;
  height:450px;
  border:0;
}

/* RESPONSIVE */
@media(max-width:992px){
  .contact-container{
    grid-template-columns:1fr;
  }

  .contact-hero h1{
    font-size:32px;
  }
}
</style>
</head>

<body>

<section class="contact-hero">
  <h1>Contact WE THE BEST EU STORE</h1>
</section>

<section class="contact-container">

  <div class="contact-info">
    <h2>Get In Touch</h2>

    <div class="info-box">
      <strong>📍 Location</strong>
      Paris, France
    </div>

    <div class="info-box">
      <strong>📧 Email</strong>
      support@wethebeststore.eu
    </div>

    <div class="info-box">
      <strong>📞 Phone</strong>
      +33 1 23 45 67 89
    </div>

    <div class="info-box">
      <strong>🕒 Working Hours</strong>
      Monday - Saturday<br>
      9:00 AM - 7:00 PM
    </div>
  </div>

  <div class="contact-form">
    <h2>Send Us a Message</h2>

    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="text" placeholder="Subject">
      <textarea placeholder="Your Message..." required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

</section>

<section class="map-section">
  <iframe 
  src="https://www.google.com/maps?q=Paris,France&output=embed">
  </iframe>
</section>

</body>
</html>
