<html>
  <head>
<style>

/* ================= GLOBAL ================= */

:root{
  --white:#ffffff;
  --gold:#c6a84f;
  --black:#111111;
  --light:#f8f8f8;
}

h1{
  font-size:5rem;
  letter-spacing:6px;
  font-weight:800;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--white);
  color:var(--black);
  overflow-x:hidden;
  scroll-behavior:smooth;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:0 8%;
}
/*  ADD SMOOTH PAGE FADE-IN */

body{
  animation:fadeIn 1s ease forwards;
  opacity:0;
}

@keyframes fadeIn{
  to{opacity:1;}
}






.campaign{
  height:70vh;
  background:url('https://images.unsplash.com/photo-1491553895911-0055eca6402d?q=80&w=2000') center/cover no-repeat;
  position:relative;
  margin:140px 0;
}

.campaign-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:flex;
  justify-content:center;
  align-items:center;
}

.campaign h2{
  color:white;
  font-family:'Playfair Display',serif;
  font-size:3rem;
}

.brands-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:40px;
  text-align:center;
}

.brand{
  padding:40px 20px;
  border:1px solid #eee;
  font-family:'Playfair Display',serif;
  font-size:1.2rem;
  letter-spacing:2px;
  cursor:pointer;
  transition:0.4s;
  background:white;
}

.brand:hover{
  background:var(--black);
  color:white;
  transform:translateY(-5px);
}


.category-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:40px;
}

.category{
  background:var(--light);
  padding:80px 0;
  text-align:center;
  font-family:'Playfair Display',serif;
  font-size:1.5rem;
  transition:0.3s;
  cursor:pointer;
}

.category:hover{
  background:var(--gold);
  color:white;
} 




.category-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.category{
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:2rem;
  font-weight:700;
  color:white;
  text-transform:uppercase;
  letter-spacing:2px;
  height:320px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:transform 0.4s, box-shadow 0.4s;
}

.category:hover{
  transform:scale(1.03);
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}



/* ================= NAVBAR ================= */

.navbar{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #eee;
  z-index:1000;
}

.nav-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:80px;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  letter-spacing:3px;
  font-weight:700;
}

.logo span{
  color:var(--gold);
}

.nav-links{
  display:flex;
  gap:40px;
  list-style:none;
}

.nav-links a{
  text-decoration:none;
  color:var(--black);
  font-size:0.9rem;
  text-transform:uppercase;
  letter-spacing:1px;
  transition:0.3s;
}

.nav-links a:hover{
  color:var(--gold);
}





/* ================= HERO ================= */

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(255,255,255,0.85),rgba(255,255,255,0.85)),
  url('https://ik.imagekit.io/odj2o1pwq/Trendy30k_Products/ASOS_DESIGN_bonded_shearling_trench_coat_in_grey_d-dIna6jr?tr=f-jpg,q-80&updatedAt=1771001739676') center/cover no-repeat;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.5rem,6vw,4.5rem);
  margin-bottom:20px;
}

.hero p{
  max-width:600px;
  margin:auto;
  color:#555;
}

.btn-primary{
  display:inline-block;
  margin-top:40px;
  padding:15px 50px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  transition:0.3s;
}

.btn-primary:hover{
  background:var(--gold);
  color:var(--white);
}

/* ================= SECTION ================= */

.section{
  padding:140px 0;
}

.section-title{
  font-family:'Playfair Display',serif;
  font-size:2.5rem;
  text-align:center;
  margin-bottom:80px;
}

/* ================= PRODUCT GRID ================= */

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:50px;
}

.product{
  background:var(--white);
  border:1px solid #f0f0f0;
  transition:0.3s;
}

.product:hover{
  transform:translateY(-8px);
}

.product img{
  width:100%;
  height:380px;
  object-fit:cover;
}

.product-content{
  padding:25px;
}

.product-content h3{
  margin-bottom:10px;
}

.price{
  color:var(--gold);
  font-weight:600;
  margin-bottom:20px;
}

.btn-black{
  padding:12px 30px;
  background:var(--black);
  color:var(--white);
  border:none;
  cursor:pointer;
  transition:0.3s;
}

.btn-black:hover{
  background:var(--gold);
}

/* ================= STRIPE CHECKOUT AREA ================= */

.checkout-section{
  background:var(--light);
  padding:120px 0;
  text-align:center;
}

.checkout-box{
  max-width:500px;
  margin:auto;
  background:var(--white);
  padding:50px;
  border:1px solid #eee;
}

.total{
  font-size:1.3rem;
  margin:20px 0;
}




/* LUXURY STYLE MODIFS */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
}

.hero-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:60px;
}

.hero-text{
  max-width:600px;
}

.hero-image img{
  width:450px;
  border-radius:20px;
  box-shadow:0 30px 60px rgba(0,0,0,0.1);
  transition:0.6s;
}

.hero-image img:hover{
  transform:scale(1.05);
}

.section-title{
  position:relative;
}

.section-title::after{
  content:'';
  width:60px;
  height:2px;
  background:var(--gold);
  display:block;
  margin:20px auto 0;
}


.social-icon, .payment-icon{
  width:32px;
  height:32px;
  filter:invert(0); /* use invert(1) for white if footer background is black */
  transition: transform 0.3s;
}

.social-icon:hover, .payment-icon:hover{
  transform:scale(1.2);
}

.story-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:80px;
  align-items:center;
}

.story-text{
  line-height:1.8;
  color:#555;
  font-size:1rem;
}

.story-grid img{
  width:100%;
  border-radius:20px;
}


.gold-orb{
  position:absolute;
  width:400px;
  height:400px;
  background:radial-gradient(circle,
    rgba(212,175,55,0.5) 0%,
    transparent 70%);
  filter:blur(120px);
  animation:float 8s infinite ease-in-out;
}

/* ================= CONTACT STRIP ================= */

.contact-strip{
  padding:60px 0;
  text-align:center;
  border-top:1px solid #eee;
}

.contact-strip p{
  margin:10px 0;
}

/* ================= FOOTER ================= */

footer{
  background:var(--black);
  color:var(--white);
  padding:60px 0;
  text-align:center;
}

</style>
</head>

</body>
</html>
